services:
  db:
    image: postgres:16-alpine
    container_name: runholix-db
    restart: unless-stopped
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runholix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    image: ghcr.io/runholix/runholix-backend:latest
    container_name: runholix-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}/${POSTGRES_DB}
      PORT: 3001
      UPLOAD_DIR: /uploads
    expose:
      - "3001"
    volumes:
      - uploads_data:/uploads

  frontend:
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    #   args:
    #     VITE_API_URL: ${VITE_API_URL:-/api}
    #     VITE_APP_NAME: ${APP_NAME:-Runholix}
    image: ghcr.io/runholix/runholix-frontend:latest
    container_name: runholix-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads_data:
